<script>
    // Функция входа
    window.loginWithPassword = function() {
        // Находим элементы внутри формы входа
        const phoneInput = document.getElementById('loginPhone');
        const passwordInput = document.getElementById('loginPassword');
        const errorDiv = document.getElementById('loginError');
        
        // Проверяем, что элементы существуют
        if (!phoneInput || !passwordInput) {
            console.error('Элементы формы не найдены');
            return;
        }
        
        const phone = phoneInput.value || '';
        const password = passwordInput.value || '';
        const TEST_PASSWORD = '888999';
        
        // Нормализация телефона
        const cleanPhone = String(phone).replace(/[^0-9]/g, '');
        const normalizedPhone = cleanPhone.length === 10 ? '7' + cleanPhone : cleanPhone;
        
        // Проверка пароля
        if (password !== TEST_PASSWORD) {
            if (errorDiv) {
                errorDiv.innerText = '❌ Неверный пароль';
                errorDiv.style.display = 'block';
            }
            return;
        }
        
        // Проверка телефона
        if (normalizedPhone.length !== 11) {
            if (errorDiv) {
                errorDiv.innerText = '❌ Неверный формат телефона';
                errorDiv.style.display = 'block';
            }
            return;
        }
        
        // Создаём или получаем пользователя
        const userKey = `user_${normalizedPhone}`;
        let user = localStorage.getItem(userKey);
        
        if (!user) {
            user = {
                id: Date.now(),
                phone: normalizedPhone,
                name: '',
                email: '',
                default_address: '',
                created_at: new Date().toISOString(),
                bonuses: 0,
                total_spent: 0
            };
            localStorage.setItem(userKey, JSON.stringify(user));
        }
        
        // Сохраняем сессию и перезагружаем
        localStorage.setItem('current_user_phone', normalizedPhone);
        location.reload();
    };
    
    // Функция выхода
    window.logoutUser = function() {
        localStorage.removeItem('current_user_phone');
        location.reload();
    };
    
    // Проверяем, есть ли активная сессия
    const currentPhone = localStorage.getItem('current_user_phone');
    const isLoggedIn = currentPhone && localStorage.getItem(`user_${currentPhone}`);
    
    if (!isLoggedIn) {
        // Ждём загрузки DOM перед отрисовкой формы
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('accountContainer');
            if (container && container.innerHTML.includes('🔄 Загрузка')) {
                container.innerHTML = `
                    <div class="login-container">
                        <h2>🔐 Вход в личный кабинет</h2>
                        <p>Введите номер телефона и пароль</p>
                        <div id="loginError" class="error-msg" style="display:none;"></div>
                        <input type="tel" id="loginPhone" class="login-input" placeholder="+7 (906) 377-19-85" value="+7 906 377 19 85">
                        <input type="password" id="loginPassword" class="login-input" placeholder="Пароль" value="888999">
                        <button class="login-btn" onclick="loginWithPassword()">Войти</button>
                        <div class="test-credentials">
                            <strong>📱 Тестовые данные:</strong><br>
                            Телефон: +7 906 377 19 85<br>
                            Пароль: 888999
                        </div>
                    </div>
                `;
            }
        });
    } else {
        // Пользователь авторизован — отображаем кабинет
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof renderAccount === 'function') {
                renderAccount();
            } else {
                console.log('⏳ Ожидание загрузки account.js...');
                setTimeout(() => {
                    if (typeof renderAccount === 'function') renderAccount();
                }, 500);
            }
        });
    }
</script>
