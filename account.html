<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет — Murano Apparel</title>
    <style>
        body { font-family: sans-serif; background: #f5f7fa; padding: 40px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 28px; }
        input, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 40px; border: 1px solid #ddd; }
        button { background: #00897b; color: white; font-weight: bold; cursor: pointer; }
        .error { color: red; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h2>🔐 Вход в личный кабинет</h2>
    <div id="errorMsg" class="error"></div>
    <input type="tel" id="phone" placeholder="+7 906 377 19 85" value="+7 906 377 19 85">
    <input type="password" id="password" placeholder="Пароль" value="888999">
    <button id="loginBtn">Войти</button>
    <div style="font-size: 12px; text-align: center; margin-top: 16px;">Тест: +7 906 377 19 85 / 888999</div>
</div>

<script>
    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', function() {
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const testPassword = '888999';

        if (password !== testPassword) {
            errorDiv.innerText = '❌ Неверный пароль';
            return;
        }

        const cleanPhone = String(phone).replace(/[^0-9]/g, '');
        const normalizedPhone = cleanPhone.length === 10 ? '7' + cleanPhone : cleanPhone;

        if (normalizedPhone.length !== 11) {
            errorDiv.innerText = '❌ Неверный формат телефона';
            return;
        }

        const userKey = `user_${normalizedPhone}`;
        if (!localStorage.getItem(userKey)) {
            localStorage.setItem(userKey, JSON.stringify({ phone: normalizedPhone, name: '', bonuses: 0 }));
        }

        localStorage.setItem('current_user_phone', normalizedPhone);
        alert('✅ Вход выполнен! Страница перезагрузится.');
        location.reload();
    });
</script>
</body>
</html>
