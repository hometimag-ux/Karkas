<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — Murano Apparel</title>
</head>
<body>
<div class="container" id="app">
    <div class="loading">🔄 Загрузка...</div>
</div>

<script>
    // ===== ФУНКЦИИ НОРМАЛИЗАЦИИ =====
    function normalizePhone(phone) {
        if (!phone) return '';
        const cleaned = String(phone).replace(/[^0-9]/g, '');
        if (cleaned.length === 11 && cleaned[0] === '7') return cleaned;
        if (cleaned.length === 10) return '7' + cleaned;
        return cleaned;
    }
    
    function formatPhone(phone) {
        const str = normalizePhone(phone);
        if (str.length === 11 && str[0] === '7') {
            return `+7 ${str.slice(1,4)} ${str.slice(4,7)}-${str.slice(7,9)}-${str.slice(9,11)}`;
        }
        return phone;
    }
    
    function getStatusText(status) {
        const map = { 'new': '🆕 Новый', 'paid': '💳 Оплачен', 'shipped': '📦 Отправлен', 'delivered': '✅ Доставлен', 'cancelled': '❌ Отменён' };
        return map[status] || status;
    }
    
    function getCurrentUser() {
        const savedPhone = localStorage.getItem('current_user_phone');
        if (!savedPhone) return null;
        const userKey = `user_${normalizePhone(savedPhone)}`;
        const user = localStorage.getItem(userKey);
        if (user) return JSON.parse(user);
        return null;
    }
    
    function getUserOrders() {
        const user = getCurrentUser();
        if (!user) return [];
        
        const userPhone = normalizePhone(user.phone);
        const saved = localStorage.getItem('crm_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                const allOrders = data.orders || [];
                return allOrders.filter(order => {
                    const orderPhone = normalizePhone(order.customer?.phone);
                    return orderPhone === userPhone;
                });
            } catch(e) { console.error(e); }
        }
        return [];
    }
    
    function getUserStats() {
        const orders = getUserOrders();
        const totalSpent = orders.reduce((sum, order) => {
            if (order.status === 'paid' || order.status === 'delivered') {
                return sum + (order.total || 0);
            }
            return sum;
        }, 0);
        return { totalSpent, bonuses: Math.floor(totalSpent * 0.05) };
    }
    
    function getWishlist() {
        const user = getCurrentUser();
        if (!user) return [];
        return JSON.parse(localStorage.getItem(`wishlist_${user.id}`) || '[]');
    }
    
    function getWishlistProducts() {
        const wishlist = getWishlist();
        if (!window.allProducts) return [];
        return window.allProducts.filter(p => wishlist.includes(p.id));
    }
    
    function removeFromWishlist(productId) {
        const user = getCurrentUser();
        if (!user) return;
        let wishlist = getWishlist();
        wishlist = wishlist.filter(id => id !== productId);
        localStorage.setItem(`wishlist_${user.id}`, JSON.stringify(wishlist));
        renderAccount();
        showToast('🗑️ Товар удалён из избранного');
    }
    
    function addToCartById(productId) {
        if (typeof window.addToCartById === 'function') {
            window.addToCartById(productId);
        } else {
            showToast('🛒 Товар добавлен в корзину');
        }
    }
    
    function showToast(msg) {
        let t = document.getElementById('toastMsg');
        if (!t) {
            t = document.createElement('div');
            t.id = 'toastMsg';
            t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2c3e;color:white;padding:12px 24px;border-radius:40px;z-index:10000;font-size:14px;opacity:0;transition:0.3s';
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // ===== ЗАКРЫТИЕ МОДАЛЬНОГО ОКНА =====
    window.closeOrderDetails = function() {
        const modal = document.getElementById('orderDetailsModal');
        if (modal) {
            modal.remove();
            document.body.style.overflow = '';
        }
    };
    
    // ===== ДЕТАЛЬНЫЙ ПРОСМОТР ЗАКАЗА =====
    window.showOrderDetails = function(orderId) {
        const orders = getUserOrders();
        const order = orders.find(o => o.order_id === orderId);
        if (!order) return;
        
        const itemsHtml = (order.items || []).map(item => `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #e2edf4;">
                <div style="flex: 2;">
                    <div style="font-weight: 600;">${escapeHtml(item.title)}</div>
                    <div style="font-size: 12px; color: #64748b; margin-top: 4px;">
                        Арт: ${escapeHtml(item.article || '—')}
                    </div>
                </div>
                <div style="flex: 1; text-align: center;">
                    <div>${escapeHtml(item.size || '—')}</div>
                    <div style="font-size: 11px; color: #64748b;">Размер</div>
                </div>
                <div style="flex: 1; text-align: center;">
                    <div>${escapeHtml(item.color || '—')}</div>
                    <div style="font-size: 11px; color: #64748b;">Цвет</div>
                </div>
                <div style="flex: 0.5; text-align: center;">
                    <div>${item.quantity}</div>
                    <div style="font-size: 11px; color: #64748b;">Кол-во</div>
                </div>
                <div style="flex: 1; text-align: right;">
                    <div style="font-weight: 600; color: #00897b;">${(item.price * item.quantity).toLocaleString()} ₽</div>
                    <div style="font-size: 11px; color: #64748b;">${item.price.toLocaleString()} ₽ / шт</div>
                </div>
            </div>
        `).join('');
        
        const deliveryInfo = order.delivery?.method === 'courier' ? '🚚 Курьерская доставка' : 
                             order.delivery?.method === 'pickup' ? '🏪 Самовывоз' : '—';
        const deliveryPrice = order.delivery?.price || 0;
        const deliveryAddress = order.address || '—';
        const paymentStatusHtml = order.payment_status === 'paid' 
            ? '<span style="color: #2e7d32;">✅ Оплачен</span>' 
            : '<span style="color: #e74c3c;">⏳ Ожидает оплаты</span>';
        const paymentMethodHtml = order.payment === 'card' ? '💳 Банковской картой' : 
                                  order.payment === 'sbp' ? '📱 СБП' : 
                                  '💰 Наличными при получении';
        
        const modalHtml = `
            <div id="orderDetailsModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:20000;" onclick="if(event.target === this) closeOrderDetails()">
                <div style="background:white;border-radius:28px;max-width:750px;width:90%;max-height:85vh;overflow-y:auto;padding:0;">
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid #e2edf4;position:sticky;top:0;background:white;border-radius:28px 28px 0 0;">
                        <h3 style="margin:0;">📋 Заказ ${order.order_id}</h3>
                        <button onclick="closeOrderDetails()" style="background:none;border:none;font-size:28px;cursor:pointer;color:#94a3b8;">&times;</button>
                    </div>
                    <div style="padding:24px;">
                        <div style="background:#f8fafc;border-radius:20px;padding:16px;margin-bottom:20px;">
                            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
                                <div><span style="color:#64748b;">📅 Дата:</span><br><strong>${order.date || '—'}</strong></div>
                                <div><span style="color:#64748b;">📊 Статус:</span><br><span class="order-status status-${order.status || 'new'}">${getStatusText(order.status)}</span></div>
                                <div><span style="color:#64748b;">🚚 Доставка:</span><br><strong>${deliveryInfo}</strong> (${deliveryPrice.toLocaleString()} ₽)</div>
                                <div><span style="color:#64748b;">📍 Адрес:</span><br><strong>${escapeHtml(deliveryAddress)}</strong></div>
                            </div>
                        </div>
                        ${order.tracking_number ? `
                        <div style="background:#e8f5e9;border-radius:20px;padding:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
                            <div><span style="color:#2e7d32;">📦 Трек-номер:</span><br><strong style="font-size:18px;">${escapeHtml(order.tracking_number)}</strong></div>
                            <a href="https://www.cdek.ru/tracking?code=${encodeURIComponent(order.tracking_number)}" target="_blank" style="background:#00897b;color:white;padding:10px 20px;border-radius:40px;text-decoration:none;font-size:14px;">🔍 Отследить</a>
                        </div>
                        ` : ''}
                        <div style="margin-bottom:20px;">
                            <h4 style="margin:0 0 16px 0;">🛍️ Товары в заказе (${(order.items || []).length})</h4>
                            <div style="background:#f8fafc;border-radius:20px;overflow:hidden;">
                                <div style="display:flex; justify-content:space-between; padding:12px 16px; background:#e2edf4; font-weight:600; font-size:13px;">
                                    <div style="flex:2;">Товар</div>
                                    <div style="flex:1; text-align:center;">Размер</div>
                                    <div style="flex:1; text-align:center;">Цвет</div>
                                    <div style="flex:0.5; text-align:center;">Кол-во</div>
                                    <div style="flex:1; text-align:right;">Сумма</div>
                                </div>
                                <div style="padding:0 16px;">${itemsHtml}</div>
                                <div style="display:flex; justify-content:flex-end; padding:16px; background:#e2edf4; font-weight:700;">
                                    <div style="text-align:right;">
                                        <div>Итого к оплате:</div>
                                        <div style="font-size:20px; color:#00897b;">${(order.total || 0).toLocaleString()} ₽</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
                            <div style="background:#f8fafc;border-radius:20px;padding:16px;">
                                <div style="color:#64748b; margin-bottom:4px;">💳 Способ оплаты</div>
                                <div><strong>${paymentMethodHtml}</strong></div>
                                <div style="margin-top:8px;">${paymentStatusHtml}</div>
                            </div>
                            <div style="background:#f8fafc;border-radius:20px;padding:16px;">
                                <div style="color:#64748b; margin-bottom:4px;">💰 Детали заказа</div>
                                <div>Товары: ${((order.total || 0) - deliveryPrice).toLocaleString()} ₽</div>
                                <div>Доставка: ${deliveryPrice === 0 ? 'Бесплатно' : deliveryPrice.toLocaleString() + ' ₽'}</div>
                            </div>
                        </div>
                        ${order.comment ? `
                        <div style="background:#f8fafc;border-radius:20px;padding:16px;margin-bottom:20px;">
                            <div style="color:#64748b; margin-bottom:4px;">💬 Комментарий</div>
                            <div>${escapeHtml(order.comment)}</div>
                        </div>
                        ` : ''}
                        <button onclick="closeOrderDetails()" style="width:100%; margin-top:8px; padding:14px; background:#00897b; color:white; border:none; border-radius:40px; cursor:pointer; font-weight:600;">Закрыть</button>
                    </div>
                </div>
            </div>
        `;
        
        const oldModal = document.getElementById('orderDetailsModal');
        if (oldModal) oldModal.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.body.style.overflow = 'hidden';
    };
    
    // ===== ОТРИСОВКА КАБИНЕТА =====
    let currentTab = 'profile';
    
    function renderAccount() {
        const user = getCurrentUser();
        const app = document.getElementById('app');
        
        if (!user) {
            app.innerHTML = `
                <div class="login-container">
                    <h2>🔐 Вход в личный кабинет</h2>
                    <div id="loginError" class="error-msg"></div>
                    <input type="tel" id="loginPhone" class="login-input" placeholder="+7 (906) 377-19-85" value="+7 906 377 19 85">
                    <input type="password" id="loginPassword" class="login-input" placeholder="Пароль" value="888999">
                    <button class="login-btn" onclick="login()">Войти</button>
                    <div class="test-credentials">
                        📱 Тестовые данные:<br>
                        Телефон: +7 906 377 19 85<br>
                        Пароль: 888999
                    </div>
                </div>
            `;
            return;
        }
        
        const stats = getUserStats();
        const orders = getUserOrders();
        const wishlistCount = getWishlist().length;
        
        app.innerHTML = `
            <div class="account-header">
                <h1>👤 Личный кабинет</h1>
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
            <div class="bonus-card">
                <div><div class="bonus-amount">${stats.bonuses.toLocaleString()} ₽</div><div class="bonus-rate">накоплено бонусов</div></div>
                <div><div class="bonus-amount">${stats.totalSpent.toLocaleString()} ₽</div><div class="bonus-rate">потрачено всего</div></div>
                <div><div>🎁 5% бонусами с каждого заказа</div></div>
            </div>
            <div class="tabs">
                <button class="tab-btn ${currentTab === 'profile' ? 'active' : ''}" onclick="setTab('profile')">👤 Профиль</button>
                <button class="tab-btn ${currentTab === 'orders' ? 'active' : ''}" onclick="setTab('orders')">📦 Мои заказы (${orders.length})</button>
                <button class="tab-btn ${currentTab === 'wishlist' ? 'active' : ''}" onclick="setTab('wishlist')">❤️ Избранное (${wishlistCount})</button>
                <button class="tab-btn ${currentTab === 'bonuses' ? 'active' : ''}" onclick="setTab('bonuses')">💰 Бонусы</button>
            </div>
            <div id="tab-profile" class="tab-content ${currentTab === 'profile' ? 'active' : ''}">
                <div class="form-group"><label>Имя</label><input type="text" id="profileName" value="${escapeHtml(user.name || '')}"></div>
                <div class="form-group"><label>Телефон</label><input type="tel" id="profilePhone" value="${formatPhone(user.phone)}" readonly></div>
                <div class="form-group"><label>Email</label><input type="email" id="profileEmail" value="${escapeHtml(user.email || '')}"></div>
                <div class="form-group"><label>Адрес доставки</label><textarea id="profileAddress" rows="2">${escapeHtml(user.default_address || '')}</textarea></div>
                <button class="save-btn" onclick="saveProfile()">💾 Сохранить изменения</button>
            </div>
            <div id="tab-orders" class="tab-content ${currentTab === 'orders' ? 'active' : ''}">
                <div id="ordersList"></div>
            </div>
            <div id="tab-wishlist" class="tab-content ${currentTab === 'wishlist' ? 'active' : ''}">
                <div id="wishlistGrid"></div>
            </div>
            <div id="tab-bonuses" class="tab-content ${currentTab === 'bonuses' ? 'active' : ''}">
                <div id="bonusHistory"></div>
            </div>
        `;
        
        renderOrders();
        renderWishlist();
        renderBonusHistory();
    }
    
    function setTab(tab) {
        currentTab = tab;
        renderAccount();
    }
    
    function saveProfile() {
        const user = getCurrentUser();
        if (!user) return;
        user.name = document.getElementById('profileName')?.value || '';
        user.email = document.getElementById('profileEmail')?.value || '';
        user.default_address = document.getElementById('profileAddress')?.value || '';
        localStorage.setItem(`user_${user.phone}`, JSON.stringify(user));
        showToast('✅ Профиль обновлён');
        renderAccount();
    }
    
    function renderOrders() {
        const orders = getUserOrders();
        const container = document.getElementById('ordersList');
        if (!container) return;
        if (orders.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">📭 У вас пока нет заказов</div>';
            return;
        }
        container.innerHTML = orders.map(order => `
            <div class="order-card" onclick="showOrderDetails('${order.order_id}')">
                <div class="order-header">
                    <span class="order-number">📋 ${order.order_id}</span>
                    <span class="order-date">📅 ${order.date || '—'}</span>
                    <span class="order-status status-${order.status || 'new'}">${getStatusText(order.status)}</span>
                    <span class="order-total">${(order.total || 0).toLocaleString()} ₽</span>
                </div>
                <div class="order-products">
                    ${(order.items || []).map(i => `${escapeHtml(i.title)} x${i.quantity}`).join(', ')}
                </div>
                ${order.tracking_number ? `
                <div class="order-tracking">
                    📦 Трек: <strong>${escapeHtml(order.tracking_number)}</strong>
                    <a href="https://www.cdek.ru/tracking?code=${encodeURIComponent(order.tracking_number)}" target="_blank">🔍 Отследить</a>
                </div>
                ` : ''}
            </div>
        `).join('');
    }
    
    function renderWishlist() {
        const products = getWishlistProducts();
        const container = document.getElementById('wishlistGrid');
        if (!container) return;
        if (products.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">❤️ Нет товаров в избранном</div>';
            return;
        }
        container.innerHTML = products.map(product => `
            <div class="wishlist-item">
                <button class="wishlist-remove" onclick="removeFromWishlist(${product.id})">🗑️</button>
                <div class="wishlist-item-img">${product.images?.[0] ? `<img src="${product.images[0]}">` : '👕'}</div>
                <div class="wishlist-item-title">${escapeHtml(product.title)}</div>
                <div class="wishlist-item-price">${(product.discount_price || product.price).toLocaleString()} ₽</div>
                <button class="save-btn" style="width:100%;" onclick="addToCartById(${product.id})">🛒 В корзину</button>
            </div>
        `).join('');
    }
    
    function renderBonusHistory() {
        const orders = getUserOrders();
        const container = document.getElementById('bonusHistory');
        if (!container) return;
        const paidOrders = orders.filter(o => o.status === 'paid' || o.status === 'delivered');
        if (paidOrders.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">💰 История начислений пуста</div>';
            return;
        }
        let balance = 0;
        const historyRows = paidOrders.map(order => {
            const amount = Math.floor((order.total || 0) * 0.05);
            balance += amount;
            return `<tr><td style="padding:12px;">${order.date || '—'}</td><td style="padding:12px; color:#00897b;">+${amount} ₽</td><td style="padding:12px;">Заказ ${order.order_id}</td><td style="padding:12px;">${balance} ₽</td></tr>`;
        }).join('');
        container.innerHTML = `<table class="bonus-table"><thead><tr><th>Дата</th><th>Сумма</th><th>Описание</th><th>Баланс</th></tr></thead><tbody>${historyRows}</tbody></table>`;
    }
    
    // ===== АВТОРИЗАЦИЯ =====
    window.login = function() {
        const phoneInput = document.getElementById('loginPhone');
        const passwordInput = document.getElementById('loginPassword');
        const errorDiv = document.getElementById('loginError');
        if (!phoneInput || !passwordInput) return;
        const phone = phoneInput.value;
        const password = passwordInput.value;
        if (password !== '888999') {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ Неверный пароль';
            return;
        }
        const cleanPhone = String(phone).replace(/[^0-9]/g, '');
        const normalizedPhone = cleanPhone.length === 10 ? '7' + cleanPhone : cleanPhone;
        if (normalizedPhone.length !== 11) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ Неверный формат телефона';
            return;
        }
        const userKey = `user_${normalizedPhone}`;
        if (!localStorage.getItem(userKey)) {
            localStorage.setItem(userKey, JSON.stringify({
                id: Date.now(),
                phone: normalizedPhone,
                name: '',
                email: '',
                default_address: '',
                created_at: new Date().toISOString(),
                bonuses: 0,
                total_spent: 0
            }));
        }
        localStorage.setItem('current_user_phone', normalizedPhone);
        renderAccount();
        showToast('✅ Добро пожаловать!');
    };
    
    window.logout = function() {
        localStorage.removeItem('current_user_phone');
        renderAccount();
        showToast('👋 Вы вышли из аккаунта');
    };
    
    window.setTab = setTab;
    window.saveProfile = saveProfile;
    window.removeFromWishlist = removeFromWishlist;
    window.addToCartById = addToCartById;
    
    // Загрузка товаров из CRM
    if (typeof window.allProducts === 'undefined') {
        const saved = localStorage.getItem('crm_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                window.allProducts = data.products || [];
                window.categories = data.categories || [];
            } catch(e) {}
        }
    }
    
    // Закрытие по ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('orderDetailsModal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = '';
            }
        }
    });
    
    // Запуск
    renderAccount();
</script>
</body>
</html>
